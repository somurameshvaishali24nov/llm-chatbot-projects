services:
  rag:
    build: .
    # Force Linux x86_64. On your Intel Mac this runs natively (fast).
    platform: linux/amd64
    ports:
      - "8888:8888"          # Jupyter Lab -> http://localhost:8888
    volumes:
      - ./:/app              # project files live on the Mac; edits persist
      # Keep the container's installed packages from being shadowed by a
      # local virtualenv folder, and avoid syncing caches into the container:
      - /app/.venv
      - /app/venv
    env_file:
      - path: .env           # API keys etc. (see .env.example)
        required: false
    depends_on:
      - qdrant
    stdin_open: true
    tty: true

  # Vector database for QdrantVectorStore (src/vectorstore.py).
  # Local/dev only - in production point QDRANT_URL at a Qdrant Cloud
  # cluster instead and drop this service.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST/gRPC API -> http://localhost:6333
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage   # persists data across restarts

volumes:
  qdrant_storage:
